ai:
    createIssuePrompt: true
    enabled: false
    maxDailyRuns: 5
    neverSoleOracle: true
    provider: none
contracts:
    - description: Recommended app shell contract generated by Visual Hive.
      expectedConsoleErrors: []
      failOnConsoleError: false
      id: app-shell-visual-stability
      runOn:
        pullRequest: true
        schedule: true
      screenshots:
        - fullPage: true
          mask: []
          name: app-shell-desktop
          route: /
          viewport: desktop
        - fullPage: true
          mask: []
          name: app-shell-mobile
          route: /
          viewport: mobile
      selectors:
        mustExist:
            - '[data-testid=''dashboard-page'']'
        mustNotExist: []
        textMustExist: []
        textMustNotExist: []
      severity: high
      steps:
        - action: assertVisible
          description: Starter page shell is visible.
          selector: '[data-testid=''dashboard-page'']'
          state: visible
          timeoutMs: 5000
      target: localPreview
      waitFor:
        - selector: '[data-testid=''dashboard-page'']'
          state: visible
          timeoutMs: 15000
    - description: Recommended route contract for /jobs generated by Visual Hive.
      expectedConsoleErrors: []
      failOnConsoleError: false
      id: route-jobs-visual-stability
      runOn:
        pullRequest: true
        schedule: true
      screenshots:
        - fullPage: true
          mask: []
          name: jobs-desktop
          route: /jobs
          viewport: desktop
      selectors:
        mustExist:
            - '[data-testid=''jobs-page'']'
        mustNotExist: []
        textMustExist: []
        textMustNotExist: []
      severity: medium
      steps:
        - action: goto
          description: Navigate to /jobs.
          route: /jobs
          state: visible
          timeoutMs: 15000
        - action: assertVisible
          description: Route /jobs shell is visible.
          selector: '[data-testid=''jobs-page'']'
          state: visible
          timeoutMs: 5000
      target: localPreview
      waitFor:
        - selector: '[data-testid=''jobs-page'']'
          state: visible
          timeoutMs: 15000
costPolicy:
    externalUpload:
        canary: false
        criticalContractsOnly: true
        full: true
        manual: true
        mutation: false
        onFailureOnly: true
        pullRequest: false
        schedule: true
    maxExternalScreenshotsPerRun: 5
    maxMonthlyExternalScreenshots: 5000
github:
    commentMarker: <!-- visual-hive-report -->
    enabled: true
    issueLabels:
        - visual-hive
        - test-failure
mutation:
    enabled: true
    minScore: 0.7
    operators:
        - hide-critical-button
        - force-login-on-demo
        - api-500
        - mobile-overflow
        - broken-image
    runOn:
        schedule: true
project:
    defaultBranch: main
    hiveConfigOrigin: generated
    hiveManagedBy: hive-integrated
    name: hive-visual-hive-final-proof-20260714-013344
    setupProfile: complex-app
    type: react-vite
selection:
    changedFiles:
        - contracts:
            - route-jobs-visual-stability
          pattern: src/routes/**
          risk: medium
        - contracts:
            - route-jobs-visual-stability
          pattern: src/pages/**
          risk: medium
        - contracts:
            - route-jobs-visual-stability
          pattern: app/**
          risk: medium
        - contracts:
            - route-jobs-visual-stability
          pattern: pages/**
          risk: medium
        - contracts:
            - app-shell-visual-stability
            - route-jobs-visual-stability
          pattern: src/**
          risk: medium
targets:
    localPreview:
        build: npm run build
        cost: cheap
        install: npm ci
        kind: command
        prSafe: true
        serve: npm run preview -- --port 4173 --strictPort
        url: http://127.0.0.1:4173
viewports:
    desktop:
        height: 900
        width: 1440
    mobile:
        height: 844
        width: 390
visual:
    artifactDir: .visual-hive/artifacts
    baselinePlatform: shared
    failOnMissingBaselineInCI: true
    maxDiffPixelRatio: 0.01
    snapshotDir: .visual-hive/snapshots
    updateSnapshots: false
