name: Hive Visual Hive Production

on:
  workflow_dispatch:
    inputs:
      hive_dispatch_id:
        description: Opaque durable Hive dispatch correlation
        required: true
        type: string
      hive_operation:
        description: Exact Hive workflow lane
        required: true
        default: production
        type: choice
        options:
          - production
          - setup-baseline-capture

run-name: "Hive Visual Hive Production [${{ inputs.hive_dispatch_id }}]"

permissions:
  contents: read
  actions: read

concurrency:
  group: hive-visual-hive-production
  cancel-in-progress: false

jobs:
  repository-test-001:
    name: Hive repository test 001
    if: ${{ inputs.hive_operation == 'production' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Prepare isolated target account
        shell: bash
        run: |
          set -euo pipefail
          if id -u hive-target >/dev/null 2>&1; then
            echo "Reserved target account already exists" >&2
            exit 1
          fi
          sudo useradd --create-home --shell /bin/bash hive-target
          sudo install -d -o hive-target -g hive-target -m 0755 /home/hive-target/.local/bin /home/hive-target/.cache
          python_bin="$(command -v python)"
          (cd / && sudo -u hive-target -- env -i HOME=/home/hive-target PATH="$PATH" "$python_bin" -I -m venv /home/hive-target/.venv)
          target_root="/opt/hive-target"
          target_workspace="/opt/hive-target/workspace"
          trusted_root="/opt/hive-target/trusted"
          test ! -e "$target_root"
          sudo install -d -o root -g root -m 0755 "$target_root" "$target_workspace" "$trusted_root"
          test -d "$GITHUB_WORKSPACE"
          test ! -L "$GITHUB_WORKSPACE"
          test "$(readlink -f "$GITHUB_WORKSPACE")" = "$GITHUB_WORKSPACE"
          sudo chown -R hive-target:hive-target "$GITHUB_WORKSPACE"
          test -d .git
          test ! -L .git
          test -f visual-hive.config.yaml
          test ! -L visual-hive.config.yaml
          sudo chown -R root:root .git
          sudo chmod -R a-w .git
          sudo chown root:root visual-hive.config.yaml
          sudo chmod 0444 visual-hive.config.yaml
          sudo chmod 1777 "$GITHUB_WORKSPACE"
          sudo mount --bind "$GITHUB_WORKSPACE" "$target_workspace"
          mountpoint -q "$target_workspace"
          test "$(stat -Lc '%d:%i' "$target_workspace")" = "$(stat -Lc '%d:%i' "$GITHUB_WORKSPACE")"
          echo "HIVE_TARGET_WORKSPACE=$target_workspace" >> "$GITHUB_ENV"
      - name: Install repository test dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 bash --noprofile --norc -euo pipefail <<'HIVE_TARGET_DEPENDENCIES'
          test -n "${HIVE_TARGET_WORKSPACE:-}"
          test "$(pwd -P)" = "$HIVE_TARGET_WORKSPACE"
          corepack_enabled=0
          enable_corepack() {
            if [ "$corepack_enabled" -eq 0 ]; then
              corepack enable --install-directory /home/hive-target/.local/bin
              corepack_enabled=1
            fi
          }
          while IFS= read -r -d '' lockfile; do
            package_dir="$(dirname "$lockfile")"
            lock_count=0
            [ -f "$package_dir/package-lock.json" ] && lock_count=$((lock_count + 1))
            [ -f "$package_dir/pnpm-lock.yaml" ] && lock_count=$((lock_count + 1))
            [ -f "$package_dir/yarn.lock" ] && lock_count=$((lock_count + 1))
            if [ "$lock_count" -ne 1 ]; then
              echo "Package scope $package_dir must contain exactly one supported lockfile" >&2
              exit 1
            fi
          done < <(find . \( -name package-lock.json -o -name pnpm-lock.yaml -o -name yarn.lock \) -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          while IFS= read -r -d '' lockfile; do
            package_dir="$(dirname "$lockfile")"
            test -f "$package_dir/package.json"
            test -f "$package_dir/package-lock.json"
            (cd "$package_dir" && npm ci)
          done < <(find . -name package-lock.json -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          while IFS= read -r -d '' lockfile; do
            enable_corepack
            package_dir="$(dirname "$lockfile")"
            (cd "$package_dir" && pnpm install --frozen-lockfile)
          done < <(find . -name pnpm-lock.yaml -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          while IFS= read -r -d '' lockfile; do
            enable_corepack
            package_dir="$(dirname "$lockfile")"
            yarn_version="$(cd "$package_dir" && yarn --version)"
            yarn_major="${yarn_version%%.*}"
            if ! [[ "$yarn_major" =~ ^[0-9]+$ ]]; then
              echo "Could not determine Yarn major version for $package_dir" >&2
              exit 1
            fi
            if [ "$yarn_major" -ge 2 ]; then
              (cd "$package_dir" && yarn install --immutable)
            else
              (cd "$package_dir" && yarn install --frozen-lockfile)
            fi
          done < <(find . -name yarn.lock -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          has_ancestor_package_lock() {
            local candidate="$1"
            node - "$candidate" <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const root = fs.realpathSync(process.cwd());
          const target = fs.realpathSync(process.argv[2]);
          const locks = ["package-lock.json", "pnpm-lock.yaml", "yarn.lock"];

          function patternsFor(scope) {
            const patterns = [];
            try {
              const manifest = JSON.parse(fs.readFileSync(path.join(scope, "package.json"), "utf8"));
              if (Array.isArray(manifest.workspaces)) patterns.push(...manifest.workspaces);
              if (manifest.workspaces && Array.isArray(manifest.workspaces.packages)) patterns.push(...manifest.workspaces.packages);
            } catch (_) {}
            try {
              const lines = fs.readFileSync(path.join(scope, "pnpm-workspace.yaml"), "utf8").split(/\r?\n/);
              let inPackages = false;
              for (const line of lines) {
                const inline = line.match(/^\s*packages\s*:\s*\[(.*)\]\s*$/);
                if (inline) {
                  for (const value of inline[1].split(",")) patterns.push(value.trim().replace(/^['"]|['"]$/g, ""));
                  inPackages = false;
                  continue;
                }
                if (/^\s*packages\s*:\s*$/.test(line)) {
                  inPackages = true;
                  continue;
                }
                if (inPackages && /^\S/.test(line)) inPackages = false;
                if (inPackages) {
                  const item = line.match(/^\s*-\s*(['"]?)(.*?)\1\s*(?:#.*)?$/);
                  if (item && item[2]) patterns.push(item[2]);
                }
              }
            } catch (_) {}
            return patterns;
          }

          function globExpression(pattern) {
            pattern = pattern.split(String.fromCharCode(92)).join("/").replace(/^\.\//, "").replace(/^\/+|\/+$/g, "");
            let source = "^";
            for (let index = 0; index < pattern.length; index += 1) {
              const character = pattern[index];
              if (character === "*") {
                if (pattern[index + 1] === "*") {
                  index += 1;
                  if (pattern[index + 1] === "/") {
                    index += 1;
                    source += "(?:.*/)?";
                  } else {
                    source += ".*";
                  }
                } else {
                  source += "[^/]*";
                }
              } else if (character === "?") {
                source += "[^/]";
              } else {
                if (".+()|[]{}^$".includes(character)) source += "\\";
                source += character;
              }
            }
            return new RegExp(source + "$");
          }

          function owns(scope) {
            const relative = path.relative(scope, target).split(path.sep).join("/");
            let matched = false;
            for (let pattern of patternsFor(scope)) {
              pattern = String(pattern).trim().split(String.fromCharCode(92)).join("/");
              const excluded = pattern.startsWith("!");
              if (excluded) pattern = pattern.slice(1);
              if (pattern && globExpression(pattern).test(relative)) matched = !excluded;
            }
            return matched;
          }

          function insideRoot(value) {
            const relative = path.relative(root, value);
            return relative === "" || (relative !== ".." && !relative.startsWith(".." + path.sep));
          }

          let scope = target;
          while (insideRoot(scope)) {
            const hasLock = locks.some((name) => fs.existsSync(path.join(scope, name)));
            if (hasLock && (scope === target || owns(scope))) process.exit(0);
            if (scope === root) break;
            const parent = path.dirname(scope);
            if (parent === scope) break;
            scope = parent;
          }
          process.exit(1);
          NODE
          }
          lockless_package_dirs=()
          while IFS= read -r -d '' manifest; do
            package_dir="$(dirname "$manifest")"
            if has_ancestor_package_lock "$package_dir"; then
              continue
            fi
            lockless_package_dirs+=("$package_dir")
          done < <(find . -name package.json -not -path '*/node_modules/*' -not -path './.git/*' -not -path '*/dist/*' -not -path '*/build/*' -not -path '*/coverage/*' -not -path '*/vendor/*' -not -path './.visual-hive/*' -print0 | sort -z)
          for package_dir in "${lockless_package_dirs[@]}"; do
            (cd "$package_dir" && npm install)
          done
          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          while IFS= read -r -d '' playwright_cli; do
            node "$playwright_cli" install chromium
          done < <(find . -path '*/node_modules/@playwright/test/cli.js' -not -path './.git/*' -print0 | sort -z)
          HIVE_TARGET_DEPENDENCIES

          mkdir -p .visual-hive
          sudo chown -R hive-target:hive-target .visual-hive
      - name: Stop dependency processes and verify exact tracked source
        shell: bash
        env:
          HIVE_TARGET_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          sudo pkill -KILL -u hive-target 2>/dev/null || true
          test "$(git rev-parse HEAD)" = "$HIVE_TARGET_HEAD_SHA"
          git diff --no-ext-diff --no-textconv --exit-code -- .
          while IFS= read -r -d '' tracked; do
            if [ -L "$tracked" ]; then
              sudo chown -h root:root -- "$tracked"
            else
              sudo chown root:root -- "$tracked"
              sudo chmod a-w -- "$tracked"
            fi
            directory="$(dirname -- "$tracked")"
            while :; do
              sudo chown root:root -- "$directory"
              sudo chmod 1777 -- "$directory"
              if [ "$directory" = "." ]; then
                break
              fi
              directory="$(dirname -- "$directory")"
            done
          done < <(git ls-files -z)
      - name: Execute exact repository test command
        shell: bash
        run: |
          set -euo pipefail
          sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 npm run build
      - name: Terminate isolated target processes and reverify source
        if: always()
        shell: bash
        env:
          HIVE_TARGET_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          target_workspace="${HIVE_TARGET_WORKSPACE:-}"
          cleanup_target_workspace() {
            if [ -n "$target_workspace" ] && mountpoint -q "$target_workspace"; then
              sudo umount "$target_workspace" || true
            fi
          }
          trap cleanup_target_workspace EXIT
          test -n "$target_workspace"
          sudo pkill -KILL -u hive-target 2>/dev/null || true
          test "$(git rev-parse HEAD)" = "$HIVE_TARGET_HEAD_SHA"
          git diff --no-ext-diff --no-textconv --exit-code -- .
          sudo umount "$target_workspace"
          trap - EXIT
          if mountpoint -q "$target_workspace"; then
            echo "Isolated target workspace remained mounted" >&2
            exit 1
          fi

